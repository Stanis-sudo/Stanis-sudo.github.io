<body>
    <nav class="red-hat-font">
        <a href="../index.html"><img src="img/g-logo-48x48.png" alt="Website logo"></a>
    </nav>
    <main>
        <header>
            <h1>Welcome to the Guess The Number Game!</h1>
            <h2>Guess a number between 1 and 99 in seven attempts!</h2>
        </header>
        <div id="main" class="game-card">
            <div class="guess-row">
                <span class="one-line">Enter a guess: </span>
                <input type="text" id="guessInput" maxlength="2" placeholder="Enter your guess">
                <button id="btnGuess">Guess</button>
                <button id="btnReset">Reset</button>
            </div>
        </div>
<div id="previousGuessesContainer" class="game-card">
    <div>Your Guesses:</div>
    <div class="guesses-list">
        <div class="guess-item"></div>
        <div class="guess-item"></div>
        <div class="guess-item"></div>
        <div class="guess-item"></div>
        <div class="guess-item"></div>
        <div class="guess-item"></div>
        <div class="guess-item"></div>
    </div>
</div>
        <div id="feedback" class="game-card"></div>
        <div id="scoreContainer" class="game-card">Your Score: Wins: <span id="wins">0</span>, Losses: <span id="losses">0</span></div>
    </main>
