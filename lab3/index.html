<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Sign Up Page </title>
    <link rel="icon" type="image/svg+xml" href="../shared/img/favicon.svg">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../shared/css/styles.css">
    <link rel="stylesheet" href="css/signup.css">
</head>

<body class="bg-light">
    <nav>
        <a href="../index.html"><img src="../shared/img/g-logo-48x48.png" alt="Website logo"></a>
    </nav>
    <main>
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-8 col-lg-6 col-xl-5">
                    <div class="card shadow-sm min-w-450">
                        <div class="card-body p-4">
                            <h1 class="text-primary text-center mb-4">Sign Up</h1>
                            <form id="signupForm" action="welcome.html">
                                <div class="mb-3 d-flex align-items-center">
                                    <label class="form-label text-nowrap me-3 mb-0 form-label-fixed">First Name</label>
                                    <input type="text" class="form-control" name="fName">
                                </div>
                                <div class="mb-3 d-flex align-items-center">
                                    <label class="form-label text-nowrap me-3 mb-0 form-label-fixed">Last Name</label>
                                    <input type="text" class="form-control" name="lName">
                                </div>
                                <div class="mb-3 d-flex align-items-center">
                                    <label class="form-label text-nowrap me-3 mb-0 form-label-fixed">Gender</label>
                                    <div class="form-check form-check-inline mb-0">
                                        <input class="form-check-input" type="radio" name="gender" value="m">
                                        <label class="form-check-label">Male</label>
                                    </div>
                                    <div class="form-check form-check-inline mb-0">
                                        <input class="form-check-input" type="radio" name="gender" value="f">
                                        <label class="form-check-label">Female</label>
                                    </div>
                                </div>
                                <div class="mb-3 d-flex align-items-center">
                                    <label class="form-label text-nowrap me-3 mb-0 form-label-fixed">Zip Code</label>
                                    <input type="text" class="form-control me-4" style="width: 100px;" id="zip" name="zip" maxlength="5">
                                    <span id="zipCodeError" class="text-nowrap"></span>
                                </div>

                                <div class="row g-2 mb-3">
                                    <div class="col">
                                        <label class="form-label">City</label>
                                        <div id="city" class="form-control bg-light"></div>
                                    </div>
                                    <div class="col">
                                        <label class="form-label">Lat</label>
                                        <div id="latitude" class="form-control bg-light"></div>
                                    </div>
                                    <div class="col">
                                        <label class="form-label">Long</label>
                                        <div id="longitude" class="form-control bg-light"></div>
                                    </div>
                                </div>

                                <div class="mb-3 d-flex align-items-center">
                                    <label class="form-label text-nowrap me-3 mb-0 form-label-fixed">State</label>
                                    <select id="state" name="state" class="form-select"></select>
                                </div>

                                <div class="mb-3 d-flex align-items-center">
                                    <label class="form-label text-nowrap me-3 mb-0 form-label-fixed">County</label>
                                    <select id="county" name="county" class="form-select" disabled></select>
                                </div>

                                <div class="mb-0 d-flex align-items-center">
                                    <label class="form-label text-nowrap me-3 mb-0 form-label-fixed">Username</label>
                                    <input type="text" class="form-control" id="username" name="username">
                                </div>
                                <div class="mb-3 d-flex align-items-center">
                                    <label class="form-label text-nowrap me-3 mb-0 form-label-fixed"></label>
                                    <span class="mb-0 mt-1" id="usernameError"></span>
                                </div>

                                <div class="mb-3 d-flex align-items-center">
                                    <label class="form-label text-nowrap me-3 mb-0 form-label-fixed">Password</label>
                                    <input type="password" class="form-control" id="password" name="password">
                                </div>
                                <div class="mb-3 d-flex align-items-center">
                                    <label class="form-label text-nowrap me-3 mb-0 form-label-fixed">Confirm</label>
                                    <input type="password" class="form-control" id="confirmPassword">
                                </div>

                                <div class="mb-3">
                                    <div id="suggestedPwd" class="text-center mb-2"></div>
                                </div>

                                <div class="mb-3 d-flex align-items-center">
                                    <span class="w-100 text-center mb-0 mt-1" id="passwordError"></span>
                                </div>

                                <input type="submit" class="btn btn-primary w-100" value="Sign up!">

                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
