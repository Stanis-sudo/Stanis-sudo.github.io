<main>
        <h1> Sign Up </h1>
        <form id="signupForm" action="welcome.html">
            First Name:<input type="text" name="fName"><br>
            Last Name: <input type="text" name="lName"><br>
            Gender:
            <input type="radio" name="gender" value="m">Male<br>
            <input type="radio" name="gender" value="f">Female<br>
            Zip Code: <input type="text" id="zip" name="zip"><br>
            <span id="zipCodeError"></span><br>
            City: <span id="city"></span> <br>
            Latitude: <span id="latitude"></span><br>
            Longitude: <span id="longitude"></span><br><br>

            State:
            <select id="state" name="state"></select> <br>

            Select a County: <select id="county" name="county" disabled=true></select><br>

            Desired Username:
            <input type="text" id="username" name="username"><br><br>
            <span id="usernameError"></span><br>

            Password: <input type="password" name="password" id="password"><br>

            <button type="button" id="useSuggestPwdBtn">Use Suggested Password</button><span id="suggestedPwd"></span>
            <button type="button" id="refreshPwdBtn" class="refresh-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M13 8a5 5 0 1 1-1.5-3.5" />
                    <polyline points="13 3 13 6 10 6" />
                </svg>
            </button>
            <br>
            Type Password Again: <input id="confirmPassword" type="password"><br>

            <span id="passwordError"></span>

            <input type="submit" value="Sign up!">
        </form>
    </main>

    <button type="button" id="refreshPwdBtn" class="refresh-btn">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M13 8a5 5 0 1 1-1.5-3.5" />
                                            <polyline points="13 3 13 6 10 6" />
                                        </svg>
                                        <button id="useSuggestPwdBtn" type="button" class="btn btn-outline-primary w-100 mb-2">
                                            Use Suggested Password
                                        </button>
